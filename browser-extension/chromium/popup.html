<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: "Segoe UI", sans-serif; width: 260px; margin: 0; padding: 14px; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    label { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .row { margin: 10px 0; }
    button { width: 100%; padding: 8px; font-size: 13px; cursor: pointer; }
    .hint { font-size: 11px; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Perfect Download Manager</h1>
  <div class="row">
    <label>
      <input type="checkbox" id="intercept" />
      Automatically send downloads to PDM
    </label>
  </div>
  <div class="row">
    <button id="test">Send current tab URL to PDM</button>
  </div>
  <div class="hint">Right-click any link and choose "Download with PDM".</div>
  <script src="popup.js"></script>
</body>
</html>

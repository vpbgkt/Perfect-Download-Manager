AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Perfect Download Manager - serverless licensing backend.
  DynamoDB (license records) + two Lambda functions (activate, validate) + HTTP API.
  The ECDSA signing private key lives in SSM Parameter Store (SecureString), not here.

Parameters:
  CodeBucket:
    Type: String
    Description: S3 bucket holding the Lambda deployment package.
  CodeKey:
    Type: String
    Description: S3 key of the Lambda deployment package (zip).
  PrivateKeyParam:
    Type: String
    Default: /pdm/licensing/private-key
    Description: SSM SecureString parameter name holding the EC private key PEM.
  TableName:
    Type: String
    Default: pdm-licenses
  TokenTtlDays:
    Type: Number
    Default: 14
    Description: Signed token lifetime; client must re-validate online within this window.

Resources:

  LicensesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: licenseKey
          AttributeType: S
      KeySchema:
        - AttributeName: licenseKey
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: pdm-licensing-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt LicensesTable.Arn
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${PrivateKeyParam}"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"

  ActivateFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: pdm-license-activate
      Runtime: nodejs20.x
      Handler: activate.handler
      MemorySize: 256
      Timeout: 10
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          LICENSE_TABLE: !Ref TableName
          PRIVATE_KEY_PARAM: !Ref PrivateKeyParam
          TOKEN_TTL_DAYS: !Ref TokenTtlDays

  ValidateFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: pdm-license-validate
      Runtime: nodejs20.x
      Handler: validate.handler
      MemorySize: 256
      Timeout: 10
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          LICENSE_TABLE: !Ref TableName
          PRIVATE_KEY_PARAM: !Ref PrivateKeyParam
          TOKEN_TTL_DAYS: !Ref TokenTtlDays

  TrialFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: pdm-license-trial
      Runtime: nodejs20.x
      Handler: trial.handler
      MemorySize: 256
      Timeout: 10
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          LICENSE_TABLE: !Ref TableName
          PRIVATE_KEY_PARAM: !Ref PrivateKeyParam
          TRIAL_DAYS: "14"

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: pdm-licensing-api
      ProtocolType: HTTP

  ActivateIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ActivateFunction.Arn
      PayloadFormatVersion: "2.0"

  ValidateIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ValidateFunction.Arn
      PayloadFormatVersion: "2.0"

  ActivateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /activate"
      Target: !Sub "integrations/${ActivateIntegration}"

  ValidateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /validate"
      Target: !Sub "integrations/${ValidateIntegration}"

  TrialIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt TrialFunction.Arn
      PayloadFormatVersion: "2.0"

  TrialRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /trial"
      Target: !Sub "integrations/${TrialIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true
      # Protect the backend from abuse/brute-force with conservative throttling.
      DefaultRouteSettings:
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

  ActivatePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ActivateFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/activate"

  ValidatePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ValidateFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/validate"

  TrialPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TrialFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/trial"

Outputs:
  ApiBaseUrl:
    Description: Base URL for the licensing API. Set as PdmLicensing.ApiBaseUrl in the client.
    Value: !GetAtt HttpApi.ApiEndpoint
  TableName:
    Value: !Ref TableName

# Nginx reverse proxy for the Admin & Reseller Portal.
#
# HTTPS-only: the portal is served exclusively over TLS on 443. There is
# deliberately NO plaintext HTTP listener that serves or proxies application
# content — satisfying the HTTPS-only requirements (Req 12.7, 15.3). Nginx
# terminates TLS and proxies to the Next.js process supervised by systemd.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Never advertise the server version.
    server_tokens off;

    # Upstream: the Next.js server (systemd unit pdm-portal.service) on loopback.
    upstream pdm_portal_upstream {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # The single application server: TLS-terminated HTTPS only.
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        server_name portal.perfectdownloadmanager.com;

        # TLS material (managed out-of-band; the VPS stores no application data).
        ssl_certificate     /etc/nginx/tls/portal.crt;
        ssl_certificate_key /etc/nginx/tls/portal.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # HSTS: force HTTPS for a year including subdomains.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 2m;

        location / {
            proxy_pass http://pdm_portal_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection        "";
            proxy_read_timeout 30s;
        }
    }
}
